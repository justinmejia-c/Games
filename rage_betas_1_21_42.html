const W=816,H=480;

let bestTimes=Array(15).fill(null);
let ftLives=3,lives=3;

function levelTime(){return LEVEL_TIMES[level]!==undefined?LEVEL_TIMES[level]:10;}

let ftRunStart=0,ftRunTime=0,ftRunning=false,ftBestRun=null;
let nightmareMode=false,stompKillEnabled=true,masterVolume=80,ftPlayed=false,settingsResetFlash=0,doubleJumpEnabled=false,extraLivesSetting=0,extraLives=0,extraUsed=0,djUsed=false,jumpHeld=false,vignetteEnabled=false;

const PANTS_COLS=['#22408a','#1a1a5a','#2a5a2a','#5a1a1a','#3a3a1a','#1a4a4a','#4a2a5a','#1a1a1a','#5a4a2a'];

const EYE_COLS=['#1a1a2e','#2244aa','#226622','#8b4513','#888800','#6622aa','#cc4400','#00aaaa','#cc2266'];

const JEWEL_SWATCH=['#444','#f5c518','#c0c0c0','#e05080','#40c8c8','#9966cc','#1faa6e','#b87333','#f0ead6'];
const HAT_SWATCH=['#444','#1a1a1a','#cc2020','#222','#e07818','#e05080','#9aa4b0','#c9a04a','#c9ab7c'];
const JEWEL_NAMES=['None','Gold Chain & Medal','Silver Chain & Medal','Rose (Right Chest)','Aqua Fish Pin','Amethyst Bracelet','Emerald Pendant','Copper Bracelet','Pearl Necklace'];
const HAT_NAMES=['None','Top Hat','Cap','Black Helmet','Headband','Flower (Ear)','Metal Helmet','Smiley Box','Paper Bag'];
const HAIRLEN_COLS=['#3a3f4e','#3a3f4e','#3a3f4e','#3a3f4e','#3a3f4e'];
const HAIRLEN_NAMES=['Short','Medium','Long','Bald','Buzzcut'];
const HAIRLEN_TXT=['SHORT','MED','LONG','BALD','BUZZ'];
const SKIN_NAMES=['Dark Oak','Deep Brown','Rich Brown','Sienna','Caramel','Warm Tan','Sandy','Fair','Ivory'];
const SHIRT_NAMES=['Royal Blue','Crimson','Forest','Purple','Amber','Navy','Rose','Charcoal','Silver'];
const PANTS_NAMES=['Navy','Midnight','Olive','Burgundy','Khaki','Teal','Plum','Jet','Brown'];
const HAIR_NAMES=['Dark Brown','Black','Auburn','Blonde','Red','Midnight','Silver','White','Forest'];
const EYE_NAMES=['Dark','Blue','Green','Hazel','Gold','Violet','Amber','Teal','Ruby'];
const SHOE_NAMES=['Dark Brown','Red','White','Navy','Olive','Silver','Tan','Black','Purple'];

let skinIdx=5,shirtIdx=5,pantsIdx=4,hairIdx=1,eyeIdx=0,shoeIdx=0,jewelIdx=0,hatIdx=0,hairLenIdx=1;

const BACK_X=PREV_X+PREV_W/2-55,BACK_Y=PREV_Y+PREV_H+14;

function canvasXY(e){const r=C.getBoundingClientRect(),sc=W/r.width;return{mx:(e.clientX-r.left)*sc,my:(e.clientY-r.top)*sc};}

C.addEventListener('mousemove',e=>{
  const{mx,my}=canvasXY(e);mouseX=mx;mouseY=my;
  if(screen==='customize')custScreenHit(mx,my);
  if(screen==='title')tmenuHit(mx,my);
  if(screen==='modes')modesHit(mx,my);
  settingsMouseMove(mx,my);pauseMouseMove(mx,my);
  if(draggingVol&&settingsOpen){const slX=SPANEL.x+24,slW=SPANEL.w-48;masterVolume=Math.max(0,Math.min(100,Math.round(((mx-slX)/slW)*100)));}
});
C.addEventListener('mousedown',e=>{
  if(e.button===2){e.preventDefault();rightMouseDown=true;}
  if(e.button===0&&settingsOpen){const{mx,my}=canvasXY(e);const slY=SPANEL.y+102,slH=6,slX=SPANEL.x+24,slW=SPANEL.w-48;if(my>=slY-8&&my<=slY+slH+8&&mx>=slX&&mx<=slX+slW)draggingVol=true;}
});
C.addEventListener('mouseup',e=>{
  if(e.button===2){e.preventDefault();if(screen==='game'&&nightmareMode&&gameMode!=='time'&&!settingsOpen&&!pauseOpen&&!gameOver&&!gameWon&&!levelDone&&rightMouseDown)shoot();rightMouseDown=false;}
  if(e.button===0)draggingVol=false;
});
document.addEventListener('mouseup',e=>{if(e.button===0)draggingVol=false;});
C.addEventListener('wheel',e=>{if(screen==='customize'){e.preventDefault();custScrollY=Math.max(0,Math.min(CUST_CONTENT_H-CUST_VIEW_H,custScrollY+e.deltaY*0.5));}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const r=C.getBoundingClientRect(),sc=W/r.width;mouseX=(e.touches[0].clientX-r.left)*sc;mouseY=(e.touches[0].clientY-r.top)*sc;},{passive:false});

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function darken(hex,f){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}catch{return hex;}}
function ftTimerStr(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${sec.toFixed(1).padStart(4,'0')}`;}
function ftTimerColor(s){const hue=Math.max(0,Math.round(120*(1-s/300)));return`hsl(${hue},85%,55%)`;}

    case 2:{ctx.strokeStyle='#8a939e';ctx.lineWidth=1.7;ctx.beginPath();ctx.moveTo(4.5,10);ctx.quadraticCurveTo(8,13.5,11.5,10);ctx.stroke();ctx.strokeStyle='#e6ecf2';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(4.5,10);ctx.quadraticCurveTo(8,13.2,11.5,10);ctx.stroke();for(let i=0;i<5;i++){const tt=i/4;ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(4.5+tt*7,10+Math.sin(tt*Math.PI)*3,.5,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#7d8791';ctx.beginPath();ctx.arc(8,15.1,2.7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#c9d2da';ctx.beginPath();ctx.arc(8,14.9,2.1,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#7d8791';ctx.lineWidth=.6;ctx.beginPath();ctx.arc(8,14.9,1.2,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(8,13.9);ctx.lineTo(8,15.9);ctx.moveTo(7,14.9);ctx.lineTo(9,14.9);ctx.stroke();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(7.1,14,.7,0,Math.PI*2);ctx.fill();break;}
    case 3:{ctx.strokeStyle='#2a6020';ctx.lineWidth=.9;ctx.beginPath();ctx.moveTo(11.4,13);ctx.quadraticCurveTo(11.1,15,11.6,17);ctx.stroke();ctx.fillStyle='#3a7828';ctx.beginPath();ctx.ellipse(10.2,15.4,1.4,.7,-.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#b03050';[[9.8,11],[12.8,11],[9.9,13],[12.7,13]].forEach(([px3,py3])=>{ctx.beginPath();ctx.arc(px3,py3,1.25,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#e05080';[[10.6,11.3],[12.1,11.3],[10.7,12.7],[12,12.7]].forEach(([px3,py3])=>{ctx.beginPath();ctx.arc(px3,py3,1.05,0,Math.PI*2);ctx.fill();});ctx.fillStyle='#ff7ba3';ctx.beginPath();ctx.arc(11.35,12,.95,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd060';ctx.beginPath();ctx.arc(11.35,12,.45,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(10.7,11.4,.35,0,Math.PI*2);ctx.fill();break;}
    case 4:{ctx.fillStyle='#2e9aa0';ctx.beginPath();ctx.moveTo(5.6,13);ctx.quadraticCurveTo(8,10.8,10.4,13);ctx.quadraticCurveTo(8,15.2,5.6,13);ctx.fill();ctx.fillStyle='#40c8c8';ctx.beginPath();ctx.moveTo(6,12.9);ctx.quadraticCurveTo(8,11.2,10,12.9);ctx.quadraticCurveTo(8,14.4,6,12.9);ctx.fill();ctx.fillStyle='#2e9aa0';ctx.beginPath();ctx.moveTo(10,13);ctx.lineTo(12.4,11.3);ctx.lineTo(12.4,14.7);ctx.closePath();ctx.fill();ctx.fillStyle='#66e0e0';ctx.beginPath();ctx.moveTo(7.6,11.5);ctx.lineTo(8.6,10.4);ctx.lineTo(9.2,11.7);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(9.2,12.2);ctx.lineTo(9.2,13.8);ctx.moveTo(8.4,12);ctx.lineTo(8.4,14);ctx.stroke();ctx.fillStyle='#0e2a30';ctx.beginPath();ctx.arc(6.6,12.6,.45,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(6.45,12.45,.18,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(160,240,255,0.7)';ctx.beginPath();ctx.arc(4.6,11.6,.5,0,Math.PI*2);ctx.stroke();break;}
    case 6:{ctx.strokeStyle='#4a2c16';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(4.5,10);ctx.quadraticCurveTo(8,13.2,11.5,10);ctx.stroke();ctx.strokeStyle='#8a5a34';ctx.lineWidth=.6;ctx.beginPath();ctx.moveTo(4.5,10);ctx.quadraticCurveTo(8,13,11.5,10);ctx.stroke();ctx.fillStyle='#c8940a';ctx.fillRect(7.4,12,1.2,1);ctx.fillStyle='#0d7a48';ctx.beginPath();ctx.moveTo(8,12.6);ctx.lineTo(9.6,14.3);ctx.lineTo(8,16);ctx.lineTo(6.4,14.3);ctx.closePath();ctx.fill();ctx.fillStyle='#1faa6e';ctx.beginPath();ctx.moveTo(8,13.2);ctx.lineTo(9.1,14.3);ctx.lineTo(8,15.4);ctx.lineTo(6.9,14.3);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=.4;ctx.beginPath();ctx.moveTo(8,12.6);ctx.lineTo(8,16);ctx.moveTo(6.4,14.3);ctx.lineTo(9.6,14.3);ctx.stroke();ctx.fillStyle='#a8ffd8';ctx.beginPath();ctx.arc(7.5,13.6,.5,0,Math.PI*2);ctx.fill();break;}
    case 8:{for(let i=0;i<7;i++){const tt=i/6,px2=4.2+tt*7.6,py2=10+Math.sin(tt*Math.PI)*3.6,pr=i%2===0?1.05:.85;ctx.fillStyle='#c9c2ae';ctx.beginPath();ctx.arc(px2,py2+.15,pr,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f0ead6';ctx.beginPath();ctx.arc(px2,py2,pr,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(px2-.3,py2-.3,.3,0,Math.PI*2);ctx.fill();}break;}

  if(isRight&&(jewelIdx===5||jewelIdx===7)){const col=jewelIdx===5?'#9966cc':'#b87333',hi=jewelIdx===5?'#c9a6ec':'#e8a763',gem=jewelIdx===5?'#e6ccff':'#ffe0b8';px(ax,ay+ah-3,aw,3,col);px(ax,ay+ah-3,aw,1,hi);ctx.fillStyle=gem;ctx.fillRect(ax+aw/2-.6,ay+ah-2.4,1.2,1.2);}
}

function drawHazard(h,t){

  if(h.type==='fire'){const fl=Math.sin(t*8+h.x)*2;[['#ff3300','#ff6600','#ffaa00'],['#ff5500','#ff8800','#ffcc00']].forEach((pal,pi)=>{pal.forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(h.x+2+pi*7,h.y+i*4+fl*(i+1)*.5,Math.max(2,h.w/2-4),8-i*2);});});}
  if(h.type==='water'){ctx.fillStyle='rgba(20,80,180,0.5)';ctx.fillRect(h.x,h.y,h.w,h.h);for(let i=0;i<h.w;i+=28){ctx.fillStyle=`rgba(100,180,255,${.15+.1*Math.sin(t*2+i/30)})`;ctx.fillRect(h.x+i+Math.sin(t+i)*4,h.y+12,14,5);}ctx.fillStyle='rgba(60,140,255,0.35)';for(let i=0;i<h.w;i+=12)ctx.fillRect(h.x+i,h.y,6,5);}

}

function tintNM(hex){try{let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,Math.round(r*.55+50));g=Math.round(g*.35);b=Math.round(b*.35);return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}catch{return hex;}}

// ── DARK FOREST background (Level 1 in Nightmare) ─────────────
function drawDarkForestBg(cam,t){
  // very dark blue-green sky
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#020810');g.addColorStop(.5,'#04120a');g.addColorStop(1,'#080806');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // blood moon
  ctx.shadowBlur=40;ctx.shadowColor='#aa2200';
  ctx.fillStyle='#cc2800';ctx.beginPath();ctx.arc(680,60,38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(674,54,24,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(180,0,0,0.2)';ctx.beginPath();ctx.arc(680,60,60,0,Math.PI*2);ctx.fill();

  // creepy red stars
  for(let i=0;i<50;i++){const sx=((i*173+t*2)%W+W)%W,sy=(i*97)%180+5,a=.3+.5*Math.abs(Math.sin(t*3+i*1.3));ctx.fillStyle=`rgba(255,80,80,${a})`;ctx.beginPath();ctx.arc(sx,sy,i%7===0?1.5:1,0,Math.PI*2);ctx.fill();}

  // distant treeline layers (3 depth layers, parallax)
  const treeLayers=[
    {spd:.04,col:'#081408',trunkCol:'#040a02',h:120,spacing:60,offset:0},
    {spd:.09,col:'#0a1c0a',trunkCol:'#060e04',h:160,spacing:48,offset:200},
    {spd:.16,col:'#0e2410',trunkCol:'#080e04',h:200,spacing:38,offset:100},
  ];
  treeLayers.forEach(({spd,col,trunkCol,h:th,spacing,offset})=>{
    const treeW=spacing;
    for(let i=-1;i<Math.ceil(W/treeW)+2;i++){
      const tx=((i*treeW+offset-cam*spd)%((Math.ceil(W/treeW)+3)*treeW)+(Math.ceil(W/treeW)+3)*treeW)%(( Math.ceil(W/treeW)+3)*treeW)-treeW;
      // trunk
      ctx.fillStyle=trunkCol;ctx.fillRect(tx+treeW/2-3,H-th*.3,6,th*.3);
      // layered triangle canopy
      ctx.fillStyle=col;
      for(let layer=0;layer<3;layer++){
        const lh=th*.5-layer*20,lw=treeW*.7-layer*8;
        ctx.beginPath();ctx.moveTo(tx+treeW/2,H-th+layer*18);ctx.lineTo(tx+treeW/2-lw/2,H-th+layer*18+lh);ctx.lineTo(tx+treeW/2+lw/2,H-th+layer*18+lh);ctx.closePath();ctx.fill();
      }
    }
  });

  // glowing eyes in the trees (random, flickering)
  const eyePairs=[[60,320],[140,345],[220,310],[400,330],[500,340],[600,315],[700,325],[760,340],[100,290],[330,300],[560,295]];
  eyePairs.forEach(([ex,ey],i)=>{
    const blink=Math.sin(t*2.5+i*1.7)>.6;
    if(blink)return;
    const a=.5+.4*Math.abs(Math.sin(t*4+i*2));
    ctx.shadowBlur=8;ctx.shadowColor='#ff0000';
    ctx.fillStyle=`rgba(255,20,20,${a})`;
    const ex2=((ex-cam*.08)%W+W)%W;
    ctx.beginPath();ctx.arc(ex2,ey,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ex2+8,ey,2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // ground fog wisps
  for(let i=0;i<6;i++){
    const fx=((i*180-cam*.12+t*18)%W+W)%W;
    const a=.06+.04*Math.sin(t*1.5+i);
    ctx.fillStyle=`rgba(10,30,15,${a})`;
    ctx.beginPath();ctx.ellipse(fx,H-72,90,22,0,0,Math.PI*2);
    ctx.fill();
  }

  // dark ground platform
  drawPlat(0,H-72,W,72,'darkforest');
  // floating skull icons near ground
  ctx.fillStyle='rgba(180,160,140,0.2)';ctx.font='22px monospace';ctx.textAlign='center';
  ctx.fillText('☠',130,H-60);ctx.fillText('☠',W-130,H-60);
}

function drawTrophy(x,y,t){const bob=Math.sin(t*1.6)*2;ctx.save();ctx.translate(x+10,y+10+bob);const s=1+.05*Math.sin(t*2.2);ctx.scale(s,s);

  ctx.strokeStyle='#e0b010';ctx.lineWidth=2;ctx.beginPath();ctx.arc(-8,-5,3.5,Math.PI*.5,Math.PI*1.5);ctx.stroke();ctx.beginPath();ctx.arc(8,-5,3.5,-Math.PI*.5,Math.PI*.5);ctx.stroke();
  ctx.fillStyle='#e0b010';ctx.fillRect(-1.5,3,3,3);ctx.fillStyle='#c8940a';ctx.fillRect(-5,6,10,2.5);ctx.fillStyle='#8a6508';ctx.fillRect(-6,8.5,12,2);
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(-4.5,-8,2,7);
  ctx.fillStyle='#fff8d0';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,-4);
  const sp=(t*1.3+x*.05)%2;if(sp<.5){const a=1-sp*2;ctx.strokeStyle=`rgba(255,255,200,${a})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(6,-12);ctx.lineTo(10,-16);ctx.moveTo(10,-12);ctx.lineTo(6,-16);ctx.stroke();}
  ctx.restore();}
function drawFluffyCloud(x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#fff';

function hudSync(){const L=LEVELS[level];document.getElementById('hl').textContent=level+1;document.getElementById('hname').textContent=L?L.name:'—';document.getElementById('hcoin').textContent='—';document.getElementById('hlives').textContent=lives;document.getElementById('hmode').textContent=gameMode==='casual'?'Casual':gameMode==='time'?'Time Trial':'First Try';const isTime=gameMode==='time',isFT=gameMode==='firsttry';document.getElementById('htimer-wrap').style.display=isTime?'':'none';document.getElementById('hlives-wrap').style.display=isTime?'none':'';document.getElementById('hft-wrap').style.display=isFT?'':'none';const showArrows=nightmareMode&&!isTime;document.getElementById('harrows-wrap').style.display=showArrows?'':'none';document.getElementById('harrows').textContent=arrows;document.getElementById('hnightmare').style.display=(nightmareMode&&!isTime)?'':'none';}

function showMsg(t,b){const mt=document.getElementById('mot');mt.textContent=t;mt.style.color=/game over/i.test(t)?'#ff6b5e':/win|clear/i.test(t)?'#ffd25e':'#fff';const esc2=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');let h2=esc2(b).replace(/\n/g,'<br>');h2=h2.replace(/Space = ([^·<]+)/g,(m,a)=>'<span class="opt opt-g">▶ Space = '+a.trim()+'</span> ').replace(/Esc = ([^·<]+)/g,(m,a)=>'<span class="opt opt-r">✕ Esc = '+a.trim()+'</span> ');document.getElementById('mob').innerHTML=h2;document.getElementById('mo').className='show';}

function rects(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function allPlats(L){const p=[...L.platforms,...movePlats.map(mp=>({x:mp.x,y:mp.y,w:mp.w,h:mp.h}))];if(L.brickPlats)L.brickPlats.forEach(b=>p.push({x:b.x,y:b.y,w:b.w,h:b.h}));hazards.filter(h=>h.type==='cloud_platform').forEach(h=>{p.push({x:h.x,y:h.y+(h._off||0)+5,w:h.w,h:7});});return p;}
function resolveObj(obj,plats,sl){obj.onGround=false;for(const p of plats){if(!rects(obj.x,obj.y,obj.w,obj.h,p.x,p.y,p.w,p.h))continue;const oL=obj.x+obj.w-p.x,oR=p.x+p.w-obj.x,oT=obj.y+obj.h-p.y,oB=p.y+p.h-obj.y;const mn=Math.min(oL,oR,oT,oB);if(mn===oT&&obj.vy>=0){obj.y=p.y-obj.h;obj.vy=0;obj.onGround=true;if(sl)obj.vx*=.93;}else if(mn===oB&&obj.vy<0){obj.y=p.y+p.h;obj.vy=0;}else if(mn===oL){obj.x=p.x-obj.w;if(!sl)obj.vx=0;}else if(mn===oR){obj.x=p.x+p.w;if(!sl)obj.vx=0;}}}
function getMobPlatBounds(L,mob){if(mob.cloudIdx!==undefined){const cp=hazards.filter(h=>h.type==='cloud_platform')[mob.cloudIdx];if(cp)return{x:cp.x,x2:cp.x+cp.w};return null;}if(mob.mpIdx!==undefined){const mp=movePlats[mob.mpIdx];if(mp)return{x:mp.x,x2:mp.x+mp.w,moving:true,mp};return null;}if(mob.platIdx!==undefined){const pl=L.platforms[mob.platIdx];if(pl)return{x:pl.x,x2:pl.x+pl.w};return null;}return null;}

  for(const mp of movePlats){mp.x+=mp.spd*mp.dir;if(mp.x>=mp.x1){mp.x=mp.x1;mp.dir=-1;}if(mp.x<=mp.x0){mp.x=mp.x0;mp.dir=1;}if(P.onGround){const py=P.y+P.h;if(py<=mp.y+18&&py>=mp.y&&P.x+P.w>mp.x&&P.x<mp.x+mp.w)P.x+=mp.spd*mp.dir;}}
  if(!P.dead){const mv=keys['ArrowLeft']||keys['KeyA']?-1:keys['ArrowRight']||keys['KeyD']?1:0;if(L.slippery){P.vx+=mv*.8;P.vx=Math.max(-4.5,Math.min(4.5,P.vx));}else P.vx=mv*3.8;if(mv!==0)P.dir=mv;if(aiming)P.dir=Math.cos(aimAngle)>=0?1:-1;const jk=keys['ArrowUp']||keys['KeyW']||keys['Space'];if(jk&&P.onGround&&!aiming)P.vy=-(L.gravity<=.25?9:12);else if(jk&&!jumpHeld&&!P.onGround&&doubleJumpEnabled&&gameMode!=='firsttry'&&!djUsed&&!aiming){P.vy=-(L.gravity<=.25?7.5:10.5);djUsed=true;}jumpHeld=jk;if(L.gravity<=.25&&jk&&P.vy<0)P.vy-=.18;P.vy+=L.gravity;P.x+=P.vx;P.y+=P.vy;resolveObj(P,allPlats(L),!!L.slippery);if(P.onGround)djUsed=false;if(P.y>H+80){P.dead=true;P.dTimer=45;}if(P.x<0)P.x=0;if(P.x+P.w>L.width)P.x=L.width-P.w;cam=Math.max(0,Math.min(L.width-W,P.x-W/3));if(invTimer===0){for(const h of hazards){if(h.type==='spike'&&rects(P.x,P.y,P.w,P.h,h.x,h.y,h.w,h.h)){P.dead=true;P.dTimer=45;}if(h.type==='fire'&&rects(P.x,P.y,P.w,P.h,h.x,h.y-14,h.w,28)){P.dead=true;P.dTimer=45;}if(h.type==='neon_beam'&&rects(P.x,P.y,P.w,P.h,h.x-4,h.y,16,h.h)){P.dead=true;P.dTimer=45;}}}if(!coinCollected){const co=L.coin;if(rects(P.x,P.y,P.w,P.h,co.x,co.y,20,20)){coinCollected=true;document.getElementById('hcoin').textContent='Gold!';if(gameMode==='time'){const t2=levelElapsed;if(bestTimes[level]===null||t2<bestTimes[level])bestTimes[level]=t2;}if(level===TOTAL_LEVELS-1){if(gameMode==='firsttry'&&ftRunning){ftRunTime=(performance.now()-ftRunStart)/1000;ftRunning=false;if(ftBestRun===null||ftRunTime<ftBestRun)ftBestRun=ftRunTime;}if(gameMode==='firsttry')ftPlayed=true;gameWon=true;const bonus=gameMode==='firsttry'?`\nRun time: ${ftTimerStr(ftRunTime)}`:'';showMsg('You Win!','All '+TOTAL_LEVELS+' levels cleared!'+bonus+' Space to continue.');}else{levelDone=true;const tm=gameMode==='time'?` Time: ${levelElapsed.toFixed(2)}s`:'';showMsg('Level '+(level+1)+' Clear!','Got the gold coin!'+tm+' Space for next.');}}}}
  else{P.dTimer--;if(P.dTimer<=0){if(gameMode!=='time'&&extraLives>0){extraLives--;extraUsed++;initLevel(level);}else if(gameMode==='firsttry'){ftLives--;lives=ftLives;document.getElementById('hlives').textContent=lives;if(ftLives<=0){if(ftRunning){ftRunTime=(performance.now()-ftRunStart)/1000;ftRunning=false;}gameOver=true;showMsg('Game Over',`Lives gone!\nRun time: ${ftTimerStr(ftRunTime)}\nSpace = Restart · Esc = Title`);}else initLevel(level);}else if(gameMode==='time')initLevel(level);else{lives--;document.getElementById('hlives').textContent=lives;if(lives<=0){gameOver=true;showMsg('Game Over','Space = Retry Level · Esc = Level Select');}else initLevel(level);}}return;}
  for(const e of enemies){if(!e.alive)continue;e.ftick++;if(e.ftick>12){e.ftick=0;e.frame^=1;}const flying=e.type==='bat'||e.type==='ghost';if(!flying){e.vy+=L.gravity;e.y+=e.vy;resolveObj(e,allPlats(L),false);if(e.onGround){e.x+=e.vx;let onP=null;for(const p of allPlats(L)){if(e.y+18===p.y&&e.x+18>p.x&&e.x<p.x+p.w){onP=p;break;}}if(onP&&(e.x<=onP.x||e.x+18>=onP.x+onP.w))e.vx*=-1;if(e.x<0||e.x+18>L.width)e.vx*=-1;}}else{e.x+=e.vx;e.y+=Math.sin(bgT*3+e.x*.01)*1;if(e.type==='ghost'){if(Math.abs(e.x-P.x)>240)e.x+=e.vx*.5;else e.x+=(P.x>e.x?.5:-.5);}if(e.x<0||e.x+18>L.width)e.vx*=-1;}e.dir=e.vx>=0?1:-1;if(invTimer===0&&rects(P.x,P.y,P.w,P.h,e.x,e.y,18,18)){if(P.vy>0&&P.y+P.h<e.y+12){e.alive=false;P.vy=-10;invTimer=20;}else if(e.type!=='ghost'||Math.floor(bgT*6)%3===0){P.dead=true;P.dTimer=45;}}}
  for(const m of mobs){if(!m.alive)continue;if(m.dying){m.dyT+=.07;if(m.dyT>=1)m.alive=false;continue;}m.ftick++;if(m.ftick>14){m.ftick=0;m.frame^=1;}const bounds=getMobPlatBounds(L,m);if(bounds){if(bounds.moving&&bounds.mp){const mp=bounds.mp;if(m._lastMpX!==undefined)m.x+=mp.x-m._lastMpX;m._lastMpX=mp.x;bounds.x=mp.x;bounds.x2=mp.x+mp.w;}m.x+=m.vx;if(m.x<=bounds.x){m.x=bounds.x;m.vx=Math.abs(m.vx);m.dir=1;}if(m.x+20>=bounds.x2){m.x=bounds.x2-20;m.vx=-Math.abs(m.vx);m.dir=-1;}}else m.x+=m.vx;if(stompKillEnabled&&invTimer===0&&P.vy>0&&P.y+P.h>=m.y&&P.y+P.h<=m.y+14&&P.x+P.w>m.x+2&&P.x<m.x+18){spawnKP(m.x,m.y,m.type);m.dying=true;m.dyT=0;P.vy=-10;invTimer=20;continue;}if(invTimer===0&&rects(P.x,P.y,P.w,P.h,m.x,m.y,20,40)){P.dead=true;P.dTimer=45;}}
  for(let i=arrowProjs.length-1;i>=0;i--){const ar=arrowProjs[i];ar.x+=ar.vx;ar.vy+=.22;ar.y+=ar.vy;let hit=false;for(const m of mobs){if(!m.alive||m.dying)continue;if(rects(ar.x-7,ar.y-5,14,10,m.x,m.y,20,40)){spawnKP(m.x,m.y,m.type);m.dying=true;m.dyT=0;hit=true;break;}}if(!hit){for(const p of allPlats(L)){if(rects(ar.x-2,ar.y-2,4,4,p.x,p.y,p.w,p.h)){hit=true;break;}}}if(hit||ar.x<-30||ar.x>L.width+30||ar.y>H+30)arrowProjs.splice(i,1);}
}

function drawArrow(ar){ctx.save();ctx.translate(ar.x,ar.y);ctx.rotate(Math.atan2(ar.vy,ar.vx));ctx.strokeStyle='#c0601a';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(10,0);ctx.stroke();ctx.fillStyle='#404040';ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(5,-4);ctx.lineTo(5,4);ctx.closePath();ctx.fill();ctx.fillStyle='#c8d040';ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-15,-3);ctx.lineTo(-15,3);ctx.closePath();ctx.fill();ctx.restore();}

function drawMobEyesThroughVignette(){
  if(!nightmareMode||!mobs)return;const forced=gameMode==='firsttry';if(!forced&&!vignetteEnabled)return;
  for(const m of mobs){
    if(!m.alive||m.dying)continue;
    const bx=Math.round(m.x-cam),by=Math.round(m.y);
    ctx.save();ctx.shadowBlur=10;ctx.shadowColor='#ff0000';ctx.fillStyle='#ff2020';
    ctx.beginPath();ctx.arc(bx+5,by+5,2.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+13,by+5,2.2,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawCharacterVignette(){
  const ft=gameMode==='firsttry';if(ft){if(!nightmareMode)return;}else{if(!vignetteEnabled)return;}
  const vp=.1+.05*Math.sin(bgT*1.8);
  const pcx=P?P.x-cam+P.w/2:W/2,pcy=P?P.y+P.h/2:H/2;
  const vg=ctx.createRadialGradient(pcx,pcy,H*.14,pcx,pcy,H*.5);
  vg.addColorStop(0,'rgba(20,0,0,0)');vg.addColorStop(.6,`rgba(15,0,0,${.6+vp})`);vg.addColorStop(1,`rgba(4,0,0,${.9+vp})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=`rgba(30,0,0,${vp*.5})`;ctx.fillRect(0,0,W,H);
}

function draw(){
  if(screen==='title'){drawTitle();if(settingsOpen)drawSettings();return;}
  if(screen==='modes'){drawModesScreen();return;}
  if(screen==='customize'){drawCustomizeScreen();return;}
  if(screen==='select'){drawSelect();return;}
  const L=LEVELS[level];ctx.clearRect(0,0,W,H);ctx.save();
  // pass level index to drawBg for nightmare L1 dark forest check
  drawBg(L.theme,cam,bgT,level);
  ctx.translate(-cam,0);
  if(L.brickPlats)L.brickPlats.forEach(b=>drawBrickPlat(b.x,b.y,b.w,b.h));
  for(const h of hazards){if(h.type!=='cloud_platform')drawHazard(h,bgT);}for(const h of hazards){if(h.type==='cloud_platform')drawHazard(h,bgT);}
  for(const p of L.platforms)drawPlat(p.x,p.y,p.w,p.h,nightmareMode&&level===0?'darkforest':L.theme);
  for(const mp of movePlats)drawMovingPlat(mp,nightmareMode&&level===0?'darkforest':L.theme);
  if(!coinCollected)drawCoin(L.coin.x,L.coin.y,L.coin.type,pulse);
  for(const e of enemies)if(e.alive)drawEnemy(e.x,e.y,e.type,e.frame);
  for(const m of mobs)if(m.alive)drawMob(m.x,m.y,m.type,m.frame,m.dir,m.dying,m.dyT);
  drawKP();for(const ar of arrowProjs)drawArrow(ar);
  if(!P.dead&&P.onGround){ctx.fillStyle='rgba(0,0,0,0.28)';ctx.beginPath();ctx.ellipse(P.x+9,P.y+P.h+2,10,3,0,0,Math.PI*2);ctx.fill();}
  drawHero(P.x,P.y,P.dir,P.dead?0:animF,P.dead,invTimer>0,aiming&&nightmareMode&&gameMode!=='time',aimAngle);
  ctx.restore();drawAimOverlay();drawCharacterVignette();drawMobEyesThroughVignette();
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(8,8,240,26);ctx.fillStyle='#eee';ctx.font='600 12px monospace';ctx.textAlign='left';ctx.textBaseline='middle';
  const levelTag=nightmareMode&&level===0?'☠ Dark Forest':'';
  ctx.fillText(L.name+(levelTag?' — '+levelTag:'')+' · Lvl '+(level+1)+'/'+TOTAL_LEVELS,14,22);
  {const baseLeft=Math.min(3,Math.max(0,gameMode==='firsttry'?ftLives:lives)),exTotal=Math.min(3,extraLives+extraUsed),baseCol=gameMode==='time'?(extraLives>0?'#1a3a8a':'#3388ff'):(extraLives>0?'#1f7a1f':'#44dd44');for(let i=0;i<3;i++){const on=i<baseLeft;if(on){ctx.shadowBlur=7;ctx.shadowColor=baseCol;}ctx.fillStyle=on?baseCol:'rgba(255,55,55,0.4)';ctx.beginPath();ctx.arc(326+i*18,22,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle=on?'rgba(255,255,255,0.4)':'rgba(255,80,80,0.7)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(326+i*18,22,7,0,Math.PI*2);ctx.stroke();}for(let i=0;i<exTotal;i++){const spare=i<extraLives,col=spare?'#f5d020':'#a04a00';if(spare){ctx.shadowBlur=7;ctx.shadowColor='#f5d020';}ctx.fillStyle=col;ctx.beginPath();ctx.arc(380+i*18,22,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle=spare?'rgba(255,255,255,0.45)':'rgba(140,70,0,0.8)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(380+i*18,22,7,0,Math.PI*2);ctx.stroke();}}
  if(nightmareMode&&gameMode!=='time'){ctx.fillStyle='rgba(160,0,0,0.8)';ctx.beginPath();ctx.roundRect(436,8,66,26,5);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🏹 '+arrows,469,22);}
  drawTimerBar();drawFTTimer();drawSB();drawQB();drawPause();drawSettings();
}

function loop(){requestAnimationFrame(loop);update();draw();}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(settingsOpen){if(e.code==='Escape')closeSettings();return;}
  if(pauseOpen){e.preventDefault();const pmCount=getPauseButtons().length;if(e.code==='Escape')closePause();else if(e.code==='ArrowDown'||e.code==='KeyS')pmHov=pmHov<0?0:(pmHov+1)%pmCount;else if(e.code==='ArrowUp'||e.code==='KeyW')pmHov=pmHov<0?pmCount-1:(pmHov+pmCount-1)%pmCount;else if((e.code==='Enter'||e.code==='Space')&&pmHov>=0)pauseAction(pmHov);return;}
  if(screen==='customize'){if(e.code==='Escape'){screen='title';custScrollY=0;}return;}
  if(screen==='modes'){if(e.code==='Escape')screen='title';return;}
  if(screen==='title'){if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();tmenuHov=tmenuHov<0?0:(tmenuHov+1)%TMENU.length;}else if(e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();tmenuHov=tmenuHov<0?TMENU.length-1:(tmenuHov+TMENU.length-1)%TMENU.length;}else if(e.code==='Space'||e.code==='Enter'){e.preventDefault();const k=tmenuHov>=0?TMENU[tmenuHov].key:'firsttry';if(k==='firsttry')startMode('firsttry');else if(k==='modes')screen='modes';else screen='customize';}return;}
  if(screen==='select'){e.preventDefault();if(e.code==='ArrowRight')selectCursor=(selectCursor+1)%TOTAL_LEVELS;if(e.code==='ArrowLeft')selectCursor=(selectCursor+TOTAL_LEVELS-1)%TOTAL_LEVELS;if(e.code==='ArrowDown')selectCursor=(selectCursor+5)%TOTAL_LEVELS;if(e.code==='ArrowUp')selectCursor=(selectCursor+TOTAL_LEVELS-5)%TOTAL_LEVELS;if(e.code==='Space'||e.code==='Enter'){lives=3;initLevel(selectCursor);screen='game';}if(e.code==='Escape')screen='title';return;}
  if(e.code==='Escape'){if(gameOver||gameWon||levelDone){if(gameWon){screen='title';hideMsg();}else if(gameOver){screen=gameMode==='casual'?'select':'title';hideMsg();}else if(levelDone){level++;initLevel(level);screen='game';}}else openPause();return;}
  if(e.code==='Space'){e.preventDefault();if(gameOver){if(gameMode==='firsttry'){ftLives=3;lives=3;extraLives=0;extraUsed=0;ftRunning=false;ftRunTime=0;initLevel(0);screen='game';}else if(gameMode==='casual'){lives=3;extraLives=extraLivesSetting;extraUsed=0;initLevel(level);screen='game';hideMsg();}else{lives=3;screen='select';hideMsg();}}else if(levelDone){level++;initLevel(level);screen='game';}else if(gameWon){screen='title';hideMsg();}else if(screen==='game'&&gameMode==='casual'&&P&&P.dead){P.dTimer=Math.min(P.dTimer,1);}}
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function startMode(key){gameMode=key;if(gameMode==='casual'){screen='select';selectCursor=0;lives=3;extraLives=extraLivesSetting;extraUsed=0;}else if(gameMode==='time'){extraLives=0;extraUsed=0;lives=99;ftLives=99;initLevel(0);screen='game';}else{ftLives=3;lives=3;extraLives=0;extraUsed=0;ftRunning=false;ftRunTime=0;initLevel(0);screen='game';}}

C.addEventListener('click',e=>{
  if(e.button!==0)return;
  const{mx,my}=canvasXY(e);
  if(settingsOpen){settingsClick(mx,my);return;}
  if(screen==='game'&&pauseOpen){pauseClick(mx,my);return;}
  if(screen==='customize'){custScreenClick(mx,my);return;}
  if(screen==='modes'){modesClick(mx,my);return;}
  if(screen==='title'){
    if(mx>=W-88&&mx<=W-8&&my>=8&&my<=36){openSettings('title');return;}
    const sw=52,sh=26,sx=W/2-sw/2+120,sy=TMENU_Y+TMENU_DEF_TOTAL+28;
    if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh){nightmareMode=!nightmareMode;return;}
    TMENU.forEach(({key},i)=>{const by=TMENU_Y+i*(TMENU_BTN_H+TMENU_GAP);if(mx>=TMENU_X&&mx<=TMENU_X+TMENU_BTN_W&&my>=by&&my<=by+TMENU_BTN_H){if(key==='firsttry')startMode('firsttry');else if(key==='modes')screen='modes';else if(key==='customize')screen='customize';}});
    return;
  }
  if(screen==='select'){for(let i=0;i<TOTAL_LEVELS;i++){const{x,y}=cPos(i);if(mx>=x&&mx<=x+CW&&my>=y&&my<=y+CH){selectCursor=i;lives=3;initLevel(i);screen='game';return;}}return;}
  if(sbHit(mx,my)){openSettings('game');return;}
  if(qbHit(mx,my)){openPause();return;}
  if(gameOver){if(gameMode==='firsttry'){ftLives=3;lives=3;extraLives=0;extraUsed=0;ftRunning=false;ftRunTime=0;initLevel(0);screen='game';}else if(gameMode==='casual'){lives=3;extraLives=extraLivesSetting;extraUsed=0;initLevel(level);screen='game';hideMsg();}else{lives=3;screen='select';hideMsg();}return;}
  if(levelDone){level++;initLevel(level);screen='game';return;}
  if(gameWon){screen='title';hideMsg();return;}
});

document.getElementById('bsh').addEventListener('pointerdown',e=>{e.preventDefault();rightMouseDown=true;});
document.getElementById('bsh').addEventListener('pointerup',()=>{if(screen==='game'&&nightmareMode&&gameMode!=='time'&&!settingsOpen&&!pauseOpen&&rightMouseDown)shoot();rightMouseDown=false;});
const hold=(el,code)=>{el.addEventListener('pointerdown',e=>{e.preventDefault();keys[code]=true;});el.addEventListener('pointerup',()=>keys[code]=false);el.addEventListener('pointerleave',()=>keys[code]=false);};
hold(document.getElementById('bl'),'ArrowLeft');hold(document.getElementById('br'),'ArrowRight');hold(document.getElementById('bj'),'ArrowUp');

loop();
</script>
