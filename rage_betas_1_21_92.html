const BACK_X=PREV_X+PREV_W/2-55,BACK_Y=PREV_Y+PREV_H+14;

function canvasXY(e){const r=C.getBoundingClientRect(),sc=W/r.width;return{mx:(e.clientX-r.left)*sc,my:(e.clientY-r.top)*sc};}

C.addEventListener('mousemove',e=>{
  const{mx,my}=canvasXY(e);mouseX=mx;mouseY=my;
  if(screen==='customize')custScreenHit(mx,my);
  if(screen==='title')tmenuHit(mx,my);
  if(screen==='modes')modesHit(mx,my);
  if(screen==='diff')diffHit(mx,my);
  settingsMouseMove(mx,my);pauseMouseMove(mx,my);
  if(draggingVol&&settingsOpen){const slX=SPANEL.x+24,slW=SPANEL.w-48;masterVolume=Math.max(0,Math.min(100,Math.round(((mx-slX)/slW)*100)));}
});
C.addEventListener('mousedown',e=>{
  if(e.button===2){e.preventDefault();rightMouseDown=true;}
  if(e.button===0&&settingsOpen){const{mx,my}=canvasXY(e);const slY=SPANEL.y+102,slH=6,slX=SPANEL.x+24,slW=SPANEL.w-48;if(my>=slY-8&&my<=slY+slH+8&&mx>=slX&&mx<=slX+slW)draggingVol=true;}
});
C.addEventListener('mouseup',e=>{
  if(e.button===2){e.preventDefault();if(screen==='game'&&nightmareMode&&gameMode!=='time'&&!settingsOpen&&!pauseOpen&&!gameOver&&!gameWon&&!levelDone&&rightMouseDown)shoot();rightMouseDown=false;}
  if(e.button===0)draggingVol=false;
});
document.addEventListener('mouseup',e=>{if(e.button===0)draggingVol=false;});
C.addEventListener('wheel',e=>{if(screen==='customize'){e.preventDefault();custScrollY=Math.max(0,Math.min(CUST_CONTENT_H-CUST_VIEW_H,custScrollY+e.deltaY*0.5));}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const r=C.getBoundingClientRect(),sc=W/r.width;mouseX=(e.touches[0].clientX-r.left)*sc;mouseY=(e.touches[0].clientY-r.top)*sc;},{passive:false});

function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function darken(hex,f){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}catch{return hex;}}
function ftTimerStr(s){const m=Math.floor(s/60),sec=s%60;return`${m}:${sec.toFixed(1).padStart(4,'0')}`;}
function ftTimerColor(s){const hue=Math.max(0,Math.round(120*(1-s/300)));return`hsl(${hue},85%,55%)`;}

function drawJewelry(){

function startMode(key){gameMode=key;if(gameMode==='casual'){screen='select';selectCursor=0;lives=3;extraLives=extraLivesSetting;extraUsed=0;}else if(gameMode==='time'){extraLives=0;extraUsed=0;lives=99;ftLives=99;initLevel(0);screen='game';}else{ftLives=ftStartLives;lives=ftStartLives;extraLives=0;extraUsed=0;ftRunning=false;ftRunTime=0;initLevel(0);screen='game';}}

C.addEventListener('click',e=>{
  if(e.button!==0)return;
  const{mx,my}=canvasXY(e);
  if(settingsOpen){settingsClick(mx,my);return;}
  if(screen==='game'&&pauseOpen){pauseClick(mx,my);return;}
  if(screen==='customize'){custScreenClick(mx,my);return;}
  if(screen==='modes'){modesClick(mx,my);return;}
  if(screen==='diff'){diffClick(mx,my);return;}
  if(screen==='title'){
    if(mailboxOpen){const xb=mailXBox();if(mx>=xb.x&&mx<=xb.x+xb.w&&my>=xb.y&&my<=xb.y+xb.h)mailboxOpen=false;return;}
    if(mailboxVisible()&&mx>=700&&mx<=762&&my>=H-168&&my<=H-72){if(mailUnlocked()){if(!mailDate)pickMailDate();mailboxOpen=true;}else{noMailStart=performance.now();}return;}
    if(mx>=W-88&&mx<=W-8&&my>=8&&my<=36){openSettings('title');return;}
    const sw=52,sh=26,sx=W/2-sw/2+120,sy=TMENU_Y+TMENU_DEF_TOTAL+28;
    if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh){nightmareMode=!nightmareMode;return;}
    TMENU.forEach(({key},i)=>{const by=TMENU_Y+i*(TMENU_BTN_H+TMENU_GAP);if(mx>=TMENU_X&&mx<=TMENU_X+TMENU_BTN_W&&my>=by&&my<=by+TMENU_BTN_H){if(key==='firsttry')screen='diff';else if(key==='modes')screen='modes';else if(key==='customize')screen='customize';}});
    return;
  }
  if(screen==='select'){if(mx>=W/2-55&&mx<=W/2+55&&my>=H-98&&my<=H-66){screen='title';return;}for(let i=0;i<TOTAL_LEVELS;i++){const{x,y}=cPos(i);if(mx>=x&&mx<=x+CW&&my>=y&&my<=y+CH){selectCursor=i;lives=3;initLevel(i);screen='game';return;}}return;}
  if(sbHit(mx,my)){openSettings('game');return;}
  if(qbHit(mx,my)){openPause();return;}
  if(gameOver){if(gameMode==='firsttry'){ftLives=ftStartLives;lives=ftStartLives;extraLives=0;extraUsed=0;ftRunning=false;ftRunTime=0;initLevel(0);screen='game';}else if(gameMode==='casual'){lives=3;extraLives=extraLivesSetting;extraUsed=0;initLevel(level);screen='game';hideMsg();}else{lives=3;screen='select';hideMsg();}return;}
  if(levelDone){level++;initLevel(level);screen='game';return;}
  if(gameWon){screen='title';hideMsg();return;}
});

// ═══════════════════════ AUDIO ENGINE (Web Audio, fully procedural) ═══════════════════════
let AC=null,AGmaster=null,AGmusic=null,AGsfx=null,noiseBuf=null,musicTimer=null,lastVolApplied=-1;
const MUSIC_LVL=.5,DUCK_LVL=.14;
function midi(n){return 440*Math.pow(2,(n-69)/12);}
function audioInit(){
  if(AC)return;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  AGmaster=AC.createGain();AGmaster.connect(AC.destination);
  AGsfx=AC.createGain();AGsfx.gain.value=.9;AGsfx.connect(AGmaster);
  AGmusic=AC.createGain();AGmusic.gain.value=MUSIC_LVL;AGmusic.connect(AGmaster);
  const len=AC.sampleRate;noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
  const d=noiseBuf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  applyMasterVol(true);
}
function applyMasterVol(force){
  if(!AGmaster)return;
  if(!force&&masterVolume===lastVolApplied)return;
  lastVolApplied=masterVolume;
  AGmaster.gain.setTargetAtTime(Math.pow(masterVolume/100,1.6)*.9,AC.currentTime,.04);
}
['pointerdown','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{audioInit();if(AC&&AC.state==='suspended')AC.resume();}));

// ── SFX primitives ──
function aTone(f,dur,{type='square',vol=.18,slideTo=0,when=0,attack=.006}={}){
  if(!AC)return;const t=AC.currentTime+when;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo),t+dur);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+attack);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(AGsfx);o.start(t);o.stop(t+dur+.03);
}
function aNoise(dur,{vol=.2,f0=3000,f1=600,q=1,hp=false,when=0}={}){
  if(!AC)return;const t=AC.currentTime+when;
  const s=AC.createBufferSource();s.buffer=noiseBuf;s.loop=true;
  const flt=AC.createBiquadFilter();flt.type=hp?'highpass':'lowpass';flt.Q.value=q;
  flt.frequency.setValueAtTime(f0,t);flt.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t+dur);
  const g=AC.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  s.connect(flt);flt.connect(g);g.connect(AGsfx);s.start(t);s.stop(t+dur+.03);
}
// ── SFX bank ──
const SFX={
  jump(){aTone(200,.16,{vol:.14,slideTo:560});},
  djump(){aTone(320,.15,{vol:.14,slideTo:820});aTone(480,.12,{vol:.08,slideTo:960,when:.03,type:'triangle'});},
  coin(){aTone(midi(83),.09,{vol:.16});aTone(midi(88),.28,{vol:.16,when:.08});aTone(midi(88)*2,.22,{vol:.05,when:.08,type:'sine'});},
  death(){aTone(300,.5,{type:'sawtooth',vol:.2,slideTo:55});aTone(150,.5,{type:'square',vol:.12,slideTo:40,when:.02});aNoise(.35,{vol:.18,f0:1800,f1:120,when:.05});},
  kill(){aNoise(.28,{vol:.26,f0:2600,f1:150});aTone(180,.24,{type:'square',vol:.16,slideTo:50,when:.01});aTone(700,.08,{vol:.1,slideTo:1400,type:'triangle'});},
  stomp(){aNoise(.14,{vol:.2,f0:1400,f1:200});aTone(240,.12,{vol:.14,slideTo:90});},
  shoot(){aNoise(.16,{vol:.14,f0:6000,f1:1400,hp:true});aTone(900,.14,{type:'sawtooth',vol:.08,slideTo:300});},
  spawn(){aTone(midi(72),.07,{vol:.07});aTone(midi(79),.09,{vol:.07,when:.06});},
  click(){aTone(1100,.045,{type:'square',vol:.07,slideTo:700});},
  pauseOn(){aTone(midi(76),.08,{vol:.1});aTone(midi(71),.12,{vol:.1,when:.07});},
  pauseOff(){aTone(midi(71),.08,{vol:.1});aTone(midi(76),.12,{vol:.1,when:.07});},
  tick(u){aTone(u<=1?1300:950,.07,{type:'square',vol:.13});},
  volBlip(){aTone(500+700*(masterVolume/100),.05,{type:'square',vol:.08});},
  levelClear(){[72,76,79,84].forEach((n,i)=>{aTone(midi(n),.16,{vol:.15,when:i*.09});aTone(midi(n-12),.16,{type:'triangle',vol:.1,when:i*.09});});aTone(midi(84),.5,{vol:.12,when:.36});},
  win(){const seq=[[72,0],[72,.13],[72,.26],[76,.39],[79,.65],[76,.91],[79,1.17]];seq.forEach(([n,w])=>{aTone(midi(n),.24,{vol:.15,when:w});aTone(midi(n+4),.24,{vol:.08,when:w,type:'triangle'});aTone(midi(n-12),.24,{vol:.1,when:w,type:'triangle'});});aTone(midi(84),.9,{vol:.13,when:1.43});aTone(midi(88),.9,{vol:.09,when:1.43});aTone(midi(79),.9,{vol:.09,when:1.43,type:'triangle'});},
  gameOver(){[[64,0],[63,.3],[62,.6],[55,.95]].forEach(([n,w])=>{aTone(midi(n),w>.9?.8:.28,{type:'sawtooth',vol:.13,when:w});aTone(midi(n-12),w>.9?.8:.28,{type:'triangle',vol:.11,when:w});});}
};

// ── MUSIC : step sequencer (8th notes), 4-bar loops ──
// note arrays are MIDI numbers, 0 = rest ; drums: k=kick s=snare h=hat
const SONGS={

    lead:[76,0,79,0,84,0,81,79, 81,0,79,76,74,0,76,0, 72,0,76,0,79,0,76,74, 76,0,74,72,69,0,0,0],
    leadType:'square',leadVol:.075,
    bass:[36,0,36,43,36,0,43,0, 33,0,33,40,33,0,40,0, 29,0,29,36,29,0,36,0, 31,0,31,38,31,0,38,0],
    kick:[1,0,0,0,1,0,0,0],snare:[0,0,0,0,0,0,0,0],hat:[0,1,0,1,0,1,0,1],hatVol:.02},
  main:{bpm:138, // 8-bar E-minor adventure loop
    lead:[76,0,83,79,76,0,79,83, 79,0,84,79,76,0,79,0, 74,0,79,74,71,0,74,79, 78,0,74,0,78,81,78,74,
          76,0,83,79,76,0,79,83, 84,0,83,84,88,0,84,0, 81,0,79,81,84,81,79,76, 78,0,75,0,71,0,0,0],
    leadType:'square',leadVol:.08,
    bass:[40,52,40,52,40,52,40,52, 36,48,36,48,36,48,36,48, 43,55,43,55,43,55,43,55, 38,50,38,50,38,50,38,50,
          40,52,40,52,40,52,40,52, 36,48,36,48,36,48,36,48, 33,45,33,45,33,45,33,45, 35,47,35,47,35,47,35,47],
    kick:[1,0,0,0,1,0,0,0],snare:[0,0,1,0,0,0,1,0],hat:[1,1,1,1,1,1,1,1],hatVol:.022},
  nightmare:{bpm:96,
    lead:[62,0,0,0,65,0,63,0, 62,0,0,0,0,0,58,0, 62,0,0,0,65,0,68,0, 67,0,65,0,63,0,62,0],
    leadType:'sawtooth',leadVol:.055,
    bass:[38,0,38,38,0,38,0,37, 34,0,34,34,0,34,0,34, 36,0,36,36,0,36,0,35, 38,0,38,38,0,38,37,36],
    kick:[1,0,0,0,0,0,0,0],snare:[0,0,0,0,1,0,0,0],hat:[0,0,1,0,0,0,1,0],hatVol:.015}
};
let curSong=null,mStep=0,mNextT=0;
function pickSong(){
  if(document.getElementById('introOv'))return null; // silent during studio intro
  if(gameWon||gameOver||levelDone)return null;
  if(screen==='game')return nightmareMode?'nightmare':'main';
  return 'title';
}
function mDrum(kind,t){
  if(kind==='k'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(130,t);o.frequency.exponentialRampToValueAtTime(38,t+.12);g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.0001,t+.13);o.connect(g);g.connect(AGmusic);o.start(t);o.stop(t+.15);}
  else{const s=AC.createBufferSource();s.buffer=noiseBuf;s.loop=true;const f=AC.createBiquadFilter();const g=AC.createGain();
    if(kind==='s'){f.type='bandpass';f.frequency.value=1800;f.Q.value=.8;g.gain.setValueAtTime(.11,t);g.gain.exponentialRampToValueAtTime(.0001,t+.11);s.start(t);s.stop(t+.12);}
    else{f.type='highpass';f.frequency.value=7000;g.gain.setValueAtTime(curSong?SONGS[curSong].hatVol:.02,t);g.gain.exponentialRampToValueAtTime(.0001,t+.04);s.start(t);s.stop(t+.05);}
    s.connect(f);f.connect(g);g.connect(AGmusic);}
}
function mNote(n,t,dur,type,vol){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.setValueAtTime(midi(n),t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.setValueAtTime(vol,t+dur*.6);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(AGmusic);o.start(t);o.stop(t+dur+.02);
}
function musicSchedule(){
  if(!AC||AC.state!=='running')return;
  applyMasterVol();
  const duck=(pauseOpen||settingsOpen)?DUCK_LVL:MUSIC_LVL;
  AGmusic.gain.setTargetAtTime(duck,AC.currentTime,.12);
  const want=pickSong();
  if(want!==curSong){curSong=want;mStep=0;mNextT=AC.currentTime+.08;}
  if(!curSong)return;
  const s=SONGS[curSong],spb=60/s.bpm/2,sLen=s.lead.length;
  while(mNextT<AC.currentTime+.16){
    const i=mStep%sLen,di=mStep%8,t=mNextT;
    const ln=s.lead[i];if(ln)mNote(ln,t,spb*1.7,s.leadType,s.leadVol);
    const bn=s.bass[i];if(bn)mNote(bn,t,spb*.95,'triangle',.09);
    if(s.kick[di])mDrum('k',t);
    if(s.snare[di])mDrum('s',t);
    if(s.hat[di])mDrum('h',t);
    mStep=(mStep+1)%sLen;mNextT+=spb;
  }
}

// ── GAME-STATE WATCHER : edge-detects events, fires SFX ──
const AW={dead:false,coin:false,ld:false,go:false,gw:false,arrows:0,dy:0,en:0,dj:false,onG:false,vy:0,Pref:null,pause:false,set:false,scr:'title',cd:99,vol:80,volT:0};
function audioWatch(){
  requestAnimationFrame(audioWatch);
  if(!AC)return;
  applyMasterVol();
  if(settingsOpen&&draggingVol&&masterVolume!==AW.vol){const now=performance.now();if(now-AW.volT>90){SFX.volBlip();AW.volT=now;}AW.vol=masterVolume;}
  if(pauseOpen&&!AW.pause)SFX.pauseOn(); if(!pauseOpen&&AW.pause)SFX.pauseOff();
  if(settingsOpen&&!AW.set)SFX.pauseOn(); if(!settingsOpen&&AW.set)SFX.pauseOff();
  AW.pause=pauseOpen;AW.set=settingsOpen;
  if(screen!==AW.scr){SFX.click();AW.scr=screen;}
  if(screen==='game'&&P){
    if(P!==AW.Pref){if(AW.Pref&&!gameOver&&!gameWon)SFX.spawn();AW.Pref=P;AW.dead=false;AW.vy=0;AW.onG=false;AW.dj=false;
      AW.arrows=arrows;AW.dy=0;AW.en=enemies?enemies.length:0;AW.coin=false;AW.ld=false;}
    if(P.dead&&!AW.dead)SFX.death();
    if(coinCollected&&!AW.coin)SFX.coin();
    if(levelDone&&!AW.ld)SFX.levelClear();
    if(gameWon&&!AW.gw)SFX.win();
    if(gameOver&&!AW.go)SFX.gameOver();
    if(arrows<AW.arrows)SFX.shoot();
    if(!P.dead&&P.vy<-8&&AW.vy>=-1&&AW.onG)SFX.jump();
    if(djUsed&&!AW.dj)SFX.djump();
    let dy=0;for(const m of mobs)if(m.dying||!m.alive)dy++;
    if(dy>AW.dy)SFX.kill();
    let en=0;for(const e of enemies)if(e.alive)en++;
    if(en<AW.en)SFX.stomp();
    
    AW.dead=P.dead;AW.coin=coinCollected;AW.ld=levelDone;AW.gw=gameWon;AW.go=gameOver;
    AW.arrows=arrows;AW.dy=dy;AW.en=en;AW.dj=djUsed;AW.onG=P.onGround;AW.vy=P.vy;
  }else{AW.gw=gameWon;AW.go=gameOver;AW.Pref=null;AW.cd=99;}
}
audioWatch();
C.addEventListener('mousedown',e=>{if(e.button===0&&(screen!=='game'||pauseOpen||settingsOpen))SFX.click();});

// PIXEL LOGO : "Rage betas"
var TITLE_IMG=null,TITLE_NM=null,TITLE_RAGE=null,TITLE_BETAS=null;
(function(){
  const LW=380,LH=228;
  function render(nm,which){
    const big=document.createElement('canvas');big.width=LW;big.height=LH;
    const b=big.getContext('2d');
    function word(txt,x,y,fpx,fill,stroke,glow){
      b.font='900 '+fpx+'px monospace';b.textAlign='left';b.textBaseline='alphabetic';b.lineJoin='round';
      b.strokeStyle=stroke;b.lineWidth=nm?9:12;b.strokeText(txt,x,y);
      if(glow){b.save();b.shadowBlur=16;b.shadowColor=glow;b.fillStyle=fill;b.fillText(txt,x,y);b.fillText(txt,x,y);b.restore();}
      else{b.fillStyle=fill;b.fillText(txt,x,y);}
    }
    if(which!=='betas')word('Rage',16,92,86,nm?'#10101e':'#f5c518',nm?'#ff2200':'#9a6b00',null);
    if(which!=='rage')word('betas',34,198,80,nm?'#10101e':'#ffffff',nm?'#ff2200':'#889aaa',nm?null:'#c8c8c8');
    return big; // full-resolution render — smooth, no pixelation
  }
  TITLE_IMG=render(false,'both');
  TITLE_NM=render(true,'both');
  TITLE_RAGE=render(false,'rage');
  TITLE_BETAS=render(false,'betas');
})();

// STUDIO INTRO
(function(){
  const ov=document.getElementById('introOv'),v=document.getElementById('introV'),tip=document.getElementById('introTip');
  let ended=false;
  function endIntro(){if(ended)return;ended=true;try{v.pause();}catch(e){}ov.style.transition='opacity .5s';ov.style.opacity='0';setTimeout(()=>ov.remove(),550);}
  v.addEventListener('ended',endIntro);
  v.addEventListener('error',endIntro);
  ov.addEventListener('click',()=>{
    if(!ended&&v.paused){v.muted=false;v.currentTime=0;v.play().catch(endIntro);tip.textContent='CLICK TO SKIP';}
    else endIntro();
  });
  v.play().catch(()=>{v.muted=true;v.play().catch(()=>{tip.textContent='CLICK TO PLAY INTRO';});});
  setTimeout(endIntro,20000);
})();
